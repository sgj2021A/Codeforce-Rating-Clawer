<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <link rel="icon" type="image/svg+xml" href="favicon.ico">	
    <title>Codeforce Rating Clawer</title>
    <!-- 字体与图标 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="app-header">
            <h1><i class="fas fa-users-between-lines"></i>Codeforce Rating Clawer</h1>
            <p class="subtitle">队友 · 曲线 · 补题</p>
        </header>

        <div class="dashboard">
            <!-- 左侧：团队成员列表 -->
            <aside class="team-sidebar">
                <div class="sidebar-header">
                    <span><i class="fas fa-user-group"></i> 团队成员</span>
                    <span class="badge" id="member-count">0</span>
                    <button class="refresh-btn" id="refreshBtn" title="刷新数据"><i class="fas fa-sync-alt"></i></button>
                </div>
                <!-- 添加成员按钮 -->
                <button class="add-member-btn" id="addMemberBtn"><i class="fas fa-plus-circle"></i> 添加成员</button>
                <div class="member-list" id="member-list-container"></div>

                <!-- 后续比赛卡片 -->
                <div class="upcoming-card">
                    <div class="upcoming-header">
                        <i class="fas fa-calendar-alt"></i> 即将到来的比赛
                    </div>
                    <div class="upcoming-list" id="upcomingContestsList">
                    </div>
                </div>

                <div class="api-note">
                    <i class="fas fa-code"></i>
                    <span>又是美好的一天</span>
                </div>
            </aside>

            <!-- 右侧主区 -->
            <main class="profile-main" id="profile-main">
                <!-- 用户概览卡片 -->
                <div class="profile-header card" id="profile-header-card"></div>

                <!-- Rating 曲线卡片 -->
                <section class="section-card card">
                    <div class="section-title"><i class="fas fa-chart-line"></i> Rating 变化曲线</div>
                    <div class="chart-container" id="rating-curve-chart" style="height:300px;"></div>
                </section>
                
                <!-- 难度直方图 -->
                <section class="section-card card">
                    <div class="section-title"><i class="fas fa-chart-bar"></i> 通过题目难度分布</div>
                    <div class="histogram-controls">
                        <div class="filter-group" id="histogram-range-group">
                            <button class="filter-btn active" data-range="all">全部</button>
                            <button class="filter-btn" data-range="year">近一年</button>
                            <button class="filter-btn" data-range="180d">近180天</button>
                            <button class="filter-btn" data-range="month">近1个月</button>
                        </div>
                    </div>
                    <div class="chart-container" id="rating-histogram-chart" style="height:250px;"></div>
                </section>

                <!-- 三栏：题目列表（支持点击打开题板） -->
                <div class="triple-grid">
                    <div class="card list-card">
                        <div class="card-header"><i class="fas fa-check-circle" style="color:#2ecc71;"></i> 已通过题目</div>
                        <div class="scrollable-list" id="solved-problems-list"></div>
                    </div>
                    <div class="card list-card">
                        <div class="card-header"><i class="fas fa-list-ul"></i> 按比赛·题目</div>
                        <div class="scrollable-list" id="contests-problems-list"></div>
                    </div>
                    <div class="card list-card">
                        <div class="card-header"><i class="fas fa-hourglass-end" style="color:#e67e22;"></i> 未补题目</div>
                        <div class="scrollable-list" id="unsolved-problems-list"></div>
                    </div>
                </div>

                <!-- 比赛记录表格 -->
                <section class="section-card card">
                    <div class="section-title">
                        <i class="fas fa-trophy"></i> 比赛记录 · 近→远
                        <span class="hint">(点击题目可查看链接)</span>
                    </div>
                    <div class="table-responsive" id="contests-table-wrapper"></div>
                </section>

            </main>
        </div>
    </div>

    <!-- 题目详情模态框 (题板 + 原题链接) -->
    <div class="modal-overlay" id="problemModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modalProblemTitle">题目详情</h3>
                <button class="modal-close" id="closeModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modalProblemBody">
                <p><strong>描述：</strong> 这是题目描述区域。包含输入输出格式、样例等。</p>
                <pre>样例输入...\n样例输出...</pre>
                <p><strong>标签：</strong> math, implementation</p>
                <p><strong>来源：</strong> Codeforces Round #100</p>
                <p><a href="#" id="modalProblemLink" target="_blank">🔗 在 Codeforces 查看原题</a></p>
            </div>
            <div class="modal-footer">
                <button class="modal-action" id="modalCloseFooterBtn">关闭</button>
            </div>
        </div>
    </div>

    <!-- 添加成员对话框 (相同样式提示框) -->
    <div class="modal-overlay" id="addMemberModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3>添加团队成员</h3>
                <button class="modal-close" id="closeAddModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <label>Codeforces Handle</label>
                <input type="text" id="newMemberHandle" class="modal-input" placeholder="例如: tourist">
                <p class="hint">输入后将自动获取用户信息</p>
            </div>
            <div class="modal-footer">
                <button class="modal-action" id="confirmAddMemberBtn">添加</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
